name: Keep Render Awake

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        run: curl -s -o /dev/null -w "%{http_code}" https://jain-furnishing-studio.onrender.com/api/health || echo "Service might be sleeping"